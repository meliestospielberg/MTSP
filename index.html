<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Méliès to Spielberg Projects | Hybrid AI & Live-Action Studio</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel for browser-side rendering -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: black; color: #d1d5db; scroll-behavior: smooth; overflow-x: hidden; }
        .font-serif { font-family: 'Playfair Display', serif; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .hero-gradient { background: radial-gradient(ellipse_at_center, #333 0%, #000 100%); }
        .text-glow { text-shadow: 0 0 12px rgba(255,255,255,0.3); }
        .logo-text { line-height: 0.9; letter-spacing: 0.15em; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Custom Inline SVG Icons for 100% Reliability
        const Icons = {
            Instagram: ({ size = 20, className = "" }) => (
                <svg className={className} viewBox="0 0 24 24" width={size} height={size} stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
            ),
            Youtube: ({ size = 20, className = "" }) => (
                <svg className={className} viewBox="0 0 24 24" width={size} height={size} stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.42a2.78 2.78 0 0 0-1.94 2C1 8.11 1 12 1 12s0 3.89.46 5.58a2.78 2.78 0 0 0 1.94 2c1.71.42 8.6.42 8.6.42s6.88 0 8.6-.42a2.78 2.78 0 0 0 1.94-2C23 15.89 23 12 23 12s0-3.89-.46-5.58z"></path><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02"></polygon></svg>
            ),
            Linkedin: ({ size = 20, className = "" }) => (
                <svg className={className} viewBox="0 0 24 24" width={size} height={size} stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path><rect x="2" y="9" width="4" height="12"></rect><circle cx="4" cy="4" r="2"></circle></svg>
            ),
            Imdb: ({ size = 20, className = "" }) => (
                <svg className={className} viewBox="0 0 24 24" width={size} height={size} fill="currentColor">
                    <path d="M22.8 5.68H1.2c-.66 0-1.2.54-1.2 1.2v10.24c0 .66.54 1.2 1.2 1.2h21.6c.66 0 1.2-.54 1.2-1.2V6.88c0-.66-.54-1.2-1.2-1.2ZM5.9 14.86H4.35v-5.6H5.9v5.6ZM10.55 9.26h-1.64l-1.07 3.55-1.07-3.55H5.13v5.6h1.44v-3.72l.84 2.8h1.03l.84-2.8v3.72h1.44v-5.6ZM13.84 10.42h-1.12v3.3h1.12c.91 0 1.65-.74 1.65-1.65 0-.91-.74-1.65-1.65-1.65ZM19.98 12.06c0 1.54-1.25 2.8-2.8 2.8h-1.05v-5.6h1.05c1.55 0 2.8 1.26 2.8 2.8ZM17.18 10.42v3.3h.84c.91 0 1.65-.74 1.65-1.65 0-.91-.74-1.65-1.65-1.65h-.84Z" />
                </svg>
            ),
            Film: ({ size = 20, className = "" }) => (
                <svg className={className} viewBox="0 0 24 24" width={size} height={size} stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect><line x1="7" y1="2" x2="7" y2="22"></line><line x1="17" y1="2" x2="17" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line><line x1="2" y1="7" x2="7" y2="7"></line><line x1="2" y1="17" x2="7" y2="17"></line><line x1="17" y1="17" x2="22" y2="17"></line><line x1="17" y1="7" x2="22" y2="7"></line></svg>
            ),
            Award: ({ size = 20, className = "" }) => (
                <svg className={className} viewBox="0 0 24 24" width={size} height={size} stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline></svg>
            ),
            ChevronDown: ({ size = 32, className = "" }) => (
                <svg className={className} viewBox="0 0 24 24" width={size} height={size} stroke="currentColor" strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
            ),
            BookOpen: ({ size = 24, className = "" }) => (
                <svg className={className} viewBox="0 0 24 24" width={size} height={size} stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
            )
        };

        function App() {
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <div className="min-h-screen bg-black">
                    {/* Navigation */}
                    <nav className={`fixed w-full z-50 transition-all duration-500 ${scrolled ? 'bg-black/95 backdrop-blur-md py-4 border-b border-gray-900' : 'bg-transparent py-6'}`}>
                        <div className="max-w-7xl mx-auto px-6 md:px-12 flex justify-between items-center">
                            <div className="text-xl md:text-2xl font-serif font-bold tracking-tighter text-white uppercase">
                                MTSP
                            </div>
                            <div className="flex items-center gap-8 text-sm font-semibold tracking-widest uppercase text-gray-400">
                                <a href="#about" className="hover:text-white transition-colors hidden md:block">Mastery</a>
                                <a href="#work" className="hover:text-white transition-colors hidden md:block">Work</a>
                                <a href="#slate" className="hover:text-white transition-colors hidden md:block">Slate</a>
                                <a href="#leadership" className="hover:text-white transition-colors">Leadership</a>
                                <div className="h-4 w-px bg-gray-800 hidden md:block"></div>
                                <div className="flex items-center gap-4">
                                    <a href="https://www.youtube.com/@MeliestoSpielbergProjects" target="_blank" className="hover:text-white transition-colors"><Icons.Youtube /></a>
                                    <a href="https://www.instagram.com/meliestospielberg/" target="_blank" className="hover:text-white transition-colors"><Icons.Instagram /></a>
                                    <a href="https://www.linkedin.com/company/meliès-to-spielberg-projects/?viewAsMember=true" target="_blank" className="hover:text-white transition-colors"><Icons.Linkedin /></a>
                                    <a href="https://www.imdb.com/search/title/?companies=co0926374" target="_blank" className="hover:text-white transition-colors"><Icons.Imdb /></a>
                                </div>
                            </div>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <header className="relative min-h-screen flex flex-col items-center justify-center overflow-hidden px-4 pt-10">
                        <div className="absolute inset-0 z-0 opacity-20 hero-gradient">
                            <div className="absolute inset-0 bg-gradient-to-b from-transparent via-black to-black z-10" />
                        </div>

                        <div className="z-10 text-center w-full max-w-5xl mx-auto flex flex-col items-center">
                            <div className="flex flex-col items-center select-none w-full">
                                <h1 className="text-4xl md:text-[4.5rem] font-sans font-light tracking-[0.25em] text-white logo-text mb-2 text-glow">Méliès</h1>
                                
                                <div className="flex items-center justify-center gap-4 md:gap-8 my-1">
                                    <div className="flex flex-col items-center justify-center text-gray-400 text-[8px] md:text-[10px] tracking-[0.2em] uppercase font-bold">
                                        {'Projects'.split('').map((char, i) => <span key={i} className="mb-0.5">{char}</span>)}
                                    </div>
                                    <div className="w-52 h-32 md:w-80 md:h-52 overflow-hidden relative border-4 md:border-8 border-black shadow-2xl bg-zinc-900">
                                        <img 
                                            src="https://drive.google.com/thumbnail?id=140xA-44QIB9v-ywHufgPPLgSQblXCc1Y&sz=w1000" 
                                            className="absolute inset-0 w-full h-full object-cover grayscale" 
                                            alt="MTSP Logo"
                                        />
                                    </div>
                                    <div className="flex flex-col items-center justify-center text-gray-400 text-[8px] md:text-[10px] tracking-[0.2em] uppercase font-bold">
                                        {'To'.split('').map((char, i) => <span key={i} className="mb-2">{char}</span>)}
                                    </div>
                                </div>
                                
                                <h1 className="text-4xl md:text-[4.5rem] font-sans font-light tracking-[0.25em] text-white logo-text mt-2 text-glow">Spielberg</h1>
                            </div>
                            <p className="mt-8 text-base md:text-lg font-light tracking-[0.4em] text-gray-500 max-w-2xl mx-auto uppercase px-4">
                                Bridging 138 Years of Cinema with the Future of AI.
                            </p>
                        </div>
                        <div className="absolute bottom-10 z-10 animate-bounce text-gray-700">
                            <Icons.ChevronDown />
                        </div>
                    </header>

                    {/* The Statement */}
                    <section className="py-24 px-6 md:px-12 bg-zinc-950 border-t border-gray-900">
                        <div className="max-w-5xl mx-auto text-center space-y-12">
                            <h2 className="text-2xl md:text-4xl font-serif text-white leading-relaxed italic">
                                "There is a particular madness in loving cinema — the kind Dostoevsky would have diagnosed, Freud would have billed you for, Kafka would have filed under the wrong department, and Nietzsche would have called the only honest religion left."
                            </h2>
                            <div className="text-lg md:text-xl text-gray-400 font-light leading-relaxed space-y-6 max-w-4xl mx-auto">
                                <p>We contracted it early. We have not recovered. We do not intend to.</p>
                                <p>
                                    Méliès to Spielberg Projects is a Mumbai-based production house at the forefront of the Hybrid AI & Live-Action movement. We specialize in the high-end integration of traditional cinematic techniques with advanced AI workflows. The AI filmmaking revolution is not coming — it arrived. It has already made something beautiful.
                                </p>
                                <p>
                                    The only question remaining is whether your next project will be part of it, or watching it from the cinema queue.
                                </p>
                            </div>
                        </div>
                    </section>

                    {/* AI Mastery Callout */}
                    <section id="about" className="py-24 px-6 md:px-12 bg-black border-t border-gray-900">
                        <div className="max-w-5xl mx-auto text-center">
                            <h2 className="text-3xl md:text-5xl font-serif text-white leading-tight mb-8">
                                25,000 Hours of AI Research.<br/> <span className="text-gray-500 italic">213 Distinct Prompt Techniques.</span>
                            </h2>
                            <p className="text-lg md:text-xl text-gray-400 leading-relaxed max-w-4xl mx-auto font-light mb-6">
                                The result is <strong>The Grand Prompt</strong>—a proprietary AI direction framework built through production, not theory. It puts the scale of a 50-person studio in the hands of one director with a point of view. That director is me.
                            </p>
                            <p className="text-lg md:text-xl text-gray-500 leading-relaxed max-w-4xl mx-auto font-light italic">
                                This is not a productivity hack. It is the Übermensch principle applied to production economics.
                            </p>
                        </div>
                    </section>

                    {/* The Work Portfolio */}
                    <section id="work" className="py-24 px-6 md:px-12 bg-zinc-950">
                        <div className="max-w-7xl mx-auto">
                            <h2 className="text-3xl md:text-5xl font-bold uppercase tracking-tighter text-white mb-12">The Work</h2>
                            
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
                                {/* Emergence of Shiva */}
                                <a href="https://www.youtube.com/watch?v=A85em5CoKc4" target="_blank" className="group relative aspect-[16/9] md:aspect-[21/9] bg-gray-900 overflow-hidden md:col-span-2 block border border-gray-800">
                                    <img src="https://img.youtube.com/vi/A85em5CoKc4/maxresdefault.jpg" className="absolute inset-0 w-full h-full object-cover" />
                                    <div className="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent flex flex-col items-center justify-end p-8 text-center pb-12">
                                        <h3 className="text-white text-2xl md:text-3xl font-bold uppercase mb-4">Emergence of Shiva</h3>
                                        <p className="text-gray-200 text-sm md:text-base max-w-3xl mb-4 font-light">Generated entirely in AI, solo, in 28 days. A 19-minute space saga merging ancient Vedic roots with a futuristic vision.</p>
                                        <p className="text-amber-500 text-xs md:text-sm tracking-widest uppercase font-bold flex items-center gap-2">
                                            <Icons.Award /> Selected by cosmonauts | Tsiolkovsky Space Film Festival. The universe, apparently, has good taste.
                                        </p>
                                    </div>
                                </a>

                                {/* Body: Dreams of E7 */}
                                <a href="https://www.youtube.com/watch?v=i_Y3vZHYeUA" target="_blank" className="group relative aspect-video bg-gray-900 overflow-hidden border border-gray-800 block">
                                    <img src="https://drive.google.com/thumbnail?id=1-UYnX_9KbKv7FsGDlTuiVxeYA4UC7TAI&sz=w1200" className="absolute inset-0 w-full h-full object-cover" />
                                    <div className="absolute inset-0 bg-gradient-to-t from-black via-black/70 to-transparent flex flex-col items-center justify-end p-6 text-center z-10">
                                        <h3 className="text-white text-xl font-bold uppercase mb-2">Body: Dreams of E7</h3>
                                        <p className="text-gray-300 text-xs mb-4">Hybrid Cinema. Integrates live actors on physical sets with AI-generated worlds—a pipeline most studios are currently forming committees to discuss.</p>
                                        <span className="text-amber-500 text-[10px] uppercase border border-amber-500/30 px-3 py-1">Watch Film</span>
                                    </div>
                                </a>

                                {/* Global Commercials */}
                                <a href="https://drive.google.com/drive/u/0/folders/1-ytP_VrcOi23wA8I8SRhadp6jCgL1bTl" target="_blank" className="group relative aspect-video bg-gray-900 overflow-hidden border border-gray-800 block">
                                    <img src="https://drive.google.com/thumbnail?id=1BSf60aBEc0aHXUReCIue3AM2SKPIeXrN&sz=w1200" className="absolute inset-0 w-full h-full object-cover" />
                                    <div className="absolute inset-0 bg-gradient-to-t from-black via-black/70 to-transparent flex flex-col items-center justify-end p-6 text-center z-10">
                                        <h3 className="text-white text-xl font-bold uppercase mb-2">Global Commercials</h3>
                                        <p className="text-gray-300 text-xs mb-4">High-end campaigns including Japanese Tourism, Serbian Games, and Healthcare branding.</p>
                                        <span className="text-amber-500 text-[10px] uppercase border border-amber-500/30 px-3 py-1">Portfolio Vault</span>
                                    </div>
                                </a>

                                {/* Art Gallery Banner */}
                                <a href="https://rishigoswamiarts.github.io/" target="_blank" className="group relative md:col-span-2 aspect-[21/9] bg-gray-900 overflow-hidden block border border-gray-800 cursor-pointer">
                                    <img src="https://drive.google.com/thumbnail?id=1mf2btGZDOZ6pDYi2unLNo1tgvfqgGoQ3&sz=w1600" className="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" />
                                    <div className="absolute inset-0 bg-gradient-to-t from-black via-black/60 to-transparent flex flex-col items-center justify-end p-8 text-center z-10">
                                        <h3 className="text-white text-2xl md:text-3xl font-bold uppercase mb-3">AI Fine Art Gallery</h3>
                                        <p className="text-gray-200 text-xs md:text-sm mb-6 max-w-3xl font-light">Thirty-plus original paintings—each a canvas where cinematic composition meets literary intent. The difference between a generated image and a work of art is the decision behind it.</p>
                                        <span className="inline-flex items-center gap-2 border border-white px-6 py-2 uppercase tracking-widest text-[10px] hover:bg-white hover:text-black transition-colors">Enter Gallery</span>
                                    </div>
                                </a>
                            </div>

                            {/* Cinematic Showcase */}
                            <div className="mt-20 mb-8"><h2 className="text-2xl md:text-3xl font-bold uppercase tracking-tighter text-white border-b border-gray-800 pb-4">Cinematic Epics</h2></div>
                            <div className="grid md:grid-cols-2 gap-6 mb-12">
                                <a href="https://www.youtube.com/watch?v=AnWBpsinNuI" target="_blank" className="group relative aspect-video bg-gray-900 border border-gray-800 overflow-hidden block">
                                    <img src="https://img.youtube.com/vi/AnWBpsinNuI/maxresdefault.jpg" className="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" />
                                    <div className="absolute inset-0 bg-black/60 flex flex-col items-center justify-center p-6 text-center group-hover:bg-black/80 transition-colors">
                                        <h3 className="text-white text-xl md:text-2xl font-bold uppercase mb-1">Moon Race 2082</h3>
                                        <p className="text-gray-300 text-xs md:text-sm font-light italic">Featuring Aston Martin Silver Birch DB12</p>
                                    </div>
                                </a>
                                <a href="https://www.youtube.com/watch?v=FPiZuIprQIk" target="_blank" className="group relative aspect-video bg-gray-900 border border-gray-800 overflow-hidden block">
                                    <img src="https://img.youtube.com/vi/FPiZuIprQIk/maxresdefault.jpg" className="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" />
                                    <div className="absolute inset-0 bg-black/60 flex flex-col items-center justify-center p-6 text-center group-hover:bg-black/80 transition-colors">
                                        <h3 className="text-white text-xl md:text-2xl font-bold uppercase mb-1">Anant-Rasa</h3>
                                        <p className="text-gray-300 text-xs md:text-sm font-light italic">Divine AI exploration of Radha & Krishna</p>
                                    </div>
                                </a>
                            </div>

                            {/* Music Poetry Grid */}
                            <div className="mt-20 mb-8">
                                <h2 className="text-2xl font-bold uppercase tracking-tighter text-white">Music & Visual Poetry</h2>
                                <p className="text-gray-400 text-sm font-light mt-2 border-b border-gray-800 pb-4 italic">Original compositions scored using AI as an instrument—not as a replacement for musicianship, but as its most radical extension since the synthesiser.</p>
                            </div>
                            <div className="grid grid-cols-2 md:grid-cols-5 gap-4 mb-16">
                                {[
                                    { id: 'e84smTQrNiU', title: 'We Are MTSP' }, { id: 'p-BIBkI-nDc', title: "Stranger's Dream" },
                                    { id: 'zl0hyRfZslY', title: 'Angel Born in Hell' }, { id: 'j1QzBOXBQ9E', title: 'Girl From Town' },
                                    { id: 'wF9QzJbVHM0', title: 'Sadashiv Ashtakam' }, { id: '39Wpzkeb8Xk', title: 'Kali Tandava' },
                                    { id: 'Mx47a8T1D4c', title: 'Dreams' }, { id: 'xRX_5Q9BBCQ', title: 'Elena & Cafe' },
                                    { id: 'SqBAJ-1cNeg', title: 'Shiv Tandav Rap' }, { id: '38CAouAbS3I', title: 'James et Elena' }
                                ].map(mv => (
                                    <a key={mv.id} href={`https://www.youtube.com/watch?v=${mv.id}`} target="_blank" className="group relative aspect-video bg-zinc-900 border border-gray-800 overflow-hidden block">
                                        <img src={`https://img.youtube.com/vi/${mv.id}/hqdefault.jpg`} className="absolute inset-0 w-full h-full object-cover opacity-60" />
                                        <div className="absolute inset-0 flex items-center justify-center p-2 text-center bg-black/40">
                                            <span className="text-white text-[9px] uppercase font-bold tracking-widest">{mv.title}</span>
                                        </div>
                                    </a>
                                ))}
                            </div>

                            {/* Narrative Podcasts */}
                            <div className="mt-20 mb-8"><h2 className="text-2xl md:text-3xl font-bold uppercase tracking-tighter text-white border-b border-gray-800 pb-4">Narrative Podcasts</h2></div>
                            <div className="grid md:grid-cols-2 gap-6 mb-12">
                                <a href="https://www.youtube.com/watch?v=vayRxJhRpC0" target="_blank" className="group relative aspect-[21/9] md:aspect-video bg-zinc-900 border border-gray-800 overflow-hidden block">
                                    <img src="https://img.youtube.com/vi/vayRxJhRpC0/maxresdefault.jpg" className="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" />
                                    <div className="absolute inset-0 bg-gradient-to-t from-black via-black/60 to-transparent flex flex-col items-center justify-end p-6 text-center z-10">
                                        <h4 className="text-white text-xl md:text-2xl font-bold uppercase mb-1">I am Hanuman</h4>
                                        <span className="text-amber-500 text-[10px] font-bold uppercase tracking-widest">Podcast | Voice: Anita Goswami</span>
                                    </div>
                                </a>
                                <a href="https://www.youtube.com/watch?v=IiQFpCAorrI" target="_blank" className="group relative aspect-[21/9] md:aspect-video bg-zinc-900 border border-gray-800 overflow-hidden block">
                                    <img src="https://img.youtube.com/vi/IiQFpCAorrI/maxresdefault.jpg" className="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" />
                                    <div className="absolute inset-0 bg-gradient-to-t from-black via-black/60 to-transparent flex flex-col items-center justify-end p-6 text-center z-10">
                                        <h4 className="text-white text-xl md:text-2xl font-bold uppercase mb-1">To Become a Buddha</h4>
                                        <span className="text-amber-500 text-[10px] font-bold uppercase tracking-widest">Podcast | Voice: Rashi Goswami</span>
                                    </div>
                                </a>
                            </div>

                            {/* Visual Novels & Innovations */}
                            <div className="mt-20 mb-8"><h2 className="text-2xl md:text-3xl font-bold uppercase tracking-tighter text-white border-b border-gray-800 pb-4">Literature & Innovation</h2></div>
                            <div className="grid md:grid-cols-2 gap-6 mb-12">
                                <div className="bg-zinc-900 border border-gray-800 flex flex-col group overflow-hidden">
                                    <div className="h-56 md:h-64 overflow-hidden">
                                        <img src="https://drive.google.com/thumbnail?id=14d4iugB6vDgJNM4Zy1qF11dmfww9NvvV&sz=w1200" className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" />
                                    </div>
                                    <div className="p-8">
                                        <h3 className="text-white text-xl md:text-2xl font-bold uppercase mb-2 flex items-center gap-3">
