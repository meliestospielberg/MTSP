        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        
        /* Cosmic Theme from Emergence of Shiva Poster */
        .hero-gradient { background: radial-gradient(circle at center, rgba(14, 165, 233, 0.15) 0%, #020617 70%, #000000 100%); }
        .text-glow { text-shadow: 0 0 15px rgba(255, 255, 255, 0.3), 0 0 30px rgba(14, 165, 233, 0.2); }
        .glow-cyan { text-shadow: 0 0 15px rgba(14, 165, 233, 0.6); }

<body>
    <div id="root"></div>

            ),
            Imdb: ({ size = 20, className = "" }) => (
                <svg className={className} viewBox="0 0 24 24" width={size} height={size} fill="currentColor">
                    <path d="M22.8 5.68H1.2c-.66 0-1.2.54-1.2 1.2v10.24c0 .66.54 1.2 1.2 1.2h21.6c.66 0 1.2-.54 1.2-1.2V6.88c0-.66-.54-1.2-1.2-1.2ZM5.9 14.86H4.35v-5.6H5.9v5.6ZM10.55 9.26h-1.64l-1.07 3.55-1.07-3.55H5.13v5.6h1.44v-3.72l.84 2.8h1.03l.84-2.8v3.72h1.44v-5.6ZM13.84 10.42h-1.12v3.3h1.12c.91 0 1.65-.74 1.65-1.65 0-.91-.74-1.65-1.65-1.65ZM19.98 12.06c0 1.54-1.25 2.8-2.8 2.8h-1.05v-5.6h1.05c1.55 0 2.8 1.26 2.8 2.8ZM17.18 10.42v3.3h.84c.91 0 1.65-.74 1.65-1.65 0-.91-.74-1.65-1.65-1.65h-.84Z" />
                </svg>

            Film: ({ size = 20, className = "" }) => (
                <svg className={className} viewBox="0 0 24 24" width={size} height={size} stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect><line x1="7" y1="2" x2="7" y2="22"></line><line x1="17" y1="2" x2="17" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line><line x1="2" y1="7" x2="7" y2="7"></line><line x1="2" y1="17" x2="7" y2="17"></line><line x1="17" y1="17" x2="22" y2="17"></line><line x1="17" y1="7" x2="22" y2="7"></line></svg>
            ),

                <svg className={className} viewBox="0 0 24 24" width={size} height={size} stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
            ),
            ChevronDown: ({ size = 32, className = "" }) => (
                <svg className={className} viewBox="0 0 24 24" width={size} height={size} stroke="currentColor" strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
            ),
            BookOpen: ({ size = 24, className = "" }) => (
                <svg className={className} viewBox="0 0 24 24" width={size} height={size} stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
            ),
            Wand2: ({ size = 20, className = "" }) => (
                <svg className={className} viewBox="0 0 24 24" width={size} height={size} stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><path d="M15 4V2"/><path d="M15 16v-2"/><path d="M8 9h2"/><path d="M20 9h2"/><path d="M17.8 11.8l1.4 1.4"/><path d="M10.8 6.2L12.2 7.6"/><path d="M17.8 6.2l1.4-1.4"/><path d="M10.8 11.8l1.4-1.4"/><path d="m3 21 9-9"/><path d="M12.2 12.2l4.6 4.6a2 2 0 0 0 2.8 0l1.4-1.4a2 2 0 0 0 0-2.8l-4.6-4.6"/></svg>
            ),
            TrendingUp: ({ size = 20, className = "" }) => (
                <svg className={className} viewBox="0 0 24 24" width={size} height={size} stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
            ),
            Layers: ({ size = 20, className = "" }) => (
                <svg className={className} viewBox="0 0 24 24" width={size} height={size} stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
            ),
            Mail: ({ size = 20, className = "" }) => (
                <svg className={className} viewBox="0 0 24 24" width={size} height={size} stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            ),

                <svg className={className} viewBox="0 0 24 24" width={size} height={size} stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            )
        };

        function App() {
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => {
                    setScrolled(window.scrollY > 50);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <div className="min-h-screen bg-cosmic-dark text-slate-200 font-sans selection:bg-cyan-500 selection:text-black">
                    
                    {/* Navigation */}
                    <nav className={`fixed w-full z-50 transition-all duration-500 ${scrolled ? 'bg-[#020617]/95 backdrop-blur-md py-4 border-b border-slate-800/80 shadow-[0_4px_30px_rgba(14,165,233,0.05)]' : 'bg-transparent py-6'}`}>
                        <div className="max-w-7xl mx-auto px-6 md:px-12 flex justify-between items-center">
                            <div className="text-xl md:text-2xl font-serif font-bold tracking-tighter text-white uppercase glow-cyan">
                                MTSP <span className="text-slate-500 text-sm font-sans tracking-widest ml-2 hidden md:inline-block text-shadow-none">Est. 2022</span>
                            </div>
                            <div className="flex items-center gap-6 text-sm font-semibold tracking-widest uppercase">
                                <a href="#about" className="hover:text-cyan-400 transition-colors hidden md:block">About</a>
                                <a href="#capabilities" className="hover:text-cyan-400 transition-colors hidden md:block">Capabilities</a>
                                <a href="#work" className="hover:text-cyan-400 transition-colors hidden md:block">Work</a>
                                <a href="#slate" className="hover:text-cyan-400 transition-colors hidden md:block">The Slate</a>
                                <a href="#leadership" className="hover:text-cyan-400 transition-colors">Leadership</a>
                                <div className="h-4 w-px bg-slate-800 hidden md:block"></div>
                                <div className="flex items-center gap-4 text-slate-400">
                                    <a href="https://www.youtube.com/@MeliestoSpielbergProjects" target="_blank" rel="noreferrer" className="hover:text-cyan-400 transition-colors"><Icons.Youtube /></a>
                                    <a href="https://www.instagram.com/meliestospielberg/" target="_blank" rel="noreferrer" className="hover:text-cyan-400 transition-colors"><Icons.Instagram /></a>
                                    <a href="https://www.linkedin.com/company/meliès-to-spielberg-projects/?viewAsMember=true" target="_blank" rel="noreferrer" className="hover:text-cyan-400 transition-colors"><Icons.Linkedin /></a>
                                    <a href="https://www.imdb.com/search/title/?companies=co0926374" target="_blank" rel="noreferrer" className="hover:text-cyan-400 transition-colors"><Icons.Imdb /></a>
                                </div>
                            </div>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <header className="relative h-screen flex flex-col items-center justify-center overflow-hidden px-4">
                        <div className="absolute inset-0 z-0 hero-gradient opacity-90"></div>

                        <div className="z-10 text-center w-full max-w-5xl mx-auto flex flex-col items-center">
                            <div className="mb-12 flex flex-col items-center select-none w-full">
                                <h1 className="text-6xl md:text-[7rem] font-sans font-light tracking-widest text-white leading-none mb-4 text-glow">Méliès</h1>
                                
                                <div className="flex items-center justify-center gap-4 md:gap-8 my-2">
                                    <div className="flex flex-col items-center justify-center text-slate-400 text-[10px] md:text-sm tracking-widest uppercase">
                                        {'Projects'.split('').map((char, i) => <span key={i} className="mb-1">{char}</span>)}
                                    </div>

                                    <div className="w-64 h-40 md:w-96 md:h-64 overflow-hidden relative border-8 border-[#020617] shadow-[0_0_40px_rgba(0,162,255,0.2)] bg-cosmic-card">
                                        <img 
                                            src="https://drive.google.com/thumbnail?id=140xA-44QIB9v-ywHufgPPLgSQblXCc1Y&sz=w1000" 
                                            alt="MTSP Center Art" 
                                            className="absolute inset-0 w-full h-full object-cover grayscale opacity-90 mix-blend-luminosity"
                                        />
                                    </div>

                                    <div className="flex flex-col items-center justify-center text-slate-400 text-[10px] md:text-sm tracking-widest uppercase">
                                        {'To'.split('').map((char, i) => <span key={i} className="mb-2">{char}</span>)}
                                    </div>
                                </div>

                                <h1 className="text-6xl md:text-[7rem] font-sans font-light tracking-widest text-white leading-none mt-4 text-glow">Spielberg</h1>
                            </div>

                            <p className="mt-8 text-xl md:text-2xl font-light tracking-wide text-cyan-100/50 max-w-2xl mx-auto uppercase drop-shadow-md">
                                Bridging 138 Years of Cinema with the Future of AI.
                            </p>
                        </div>

                        <div className="absolute bottom-10 z-10 animate-bounce text-cyan-800">
                            <Icons.ChevronDown size={32} />
                        </div>
                    </header>

                    {/* The Statement */}
                    <section id="about" className="py-32 px-6 md:px-12 bg-cosmic-dark border-t border-slate-800/50 relative overflow-hidden">
                        <div className="absolute top-0 left-1/2 -translate-x-1/2 w-3/4 h-32 bg-cyan-900/10 blur-[100px] pointer-events-none"></div>
                        <div className="max-w-5xl mx-auto text-center relative z-10">
                            <h2 className="text-4xl md:text-6xl font-serif text-white leading-tight mb-12 drop-shadow-xl">
                                "We don't just use AI;<br/>we use it to <span className="text-gold italic">enhance</span> the human narrative."
                            </h2>
                            <p className="text-lg md:text-xl text-slate-300 leading-relaxed max-w-3xl mx-auto font-light">
                                Méliès to Spielberg Projects is a Mumbai-based production house at the forefront of the Hybrid AI & Live-Action movement. We specialize in the high-end integration of traditional cinematic techniques with advanced AI workflows to deliver premium content with unprecedented efficiency.
                            </p>
                        </div>
                    </section>

                    {/* Capabilities */}
                    <section id="capabilities" className="py-24 px-6 md:px-12 bg-cosmic-panel">
                        <div className="max-w-7xl mx-auto">
                            <div className="flex flex-col md:flex-row justify-between items-end mb-16 border-b border-slate-800 pb-8">
                                <h2 className="text-3xl md:text-5xl font-bold uppercase tracking-tighter text-white glow-cyan">Our Specialized<br/>Capabilities</h2>
                                <p className="text-slate-400 max-w-sm mt-4 md:mt-0 uppercase tracking-widest text-xs font-bold">Equipped to deliver world-class results.</p>
                            </div>

                            <div className="grid md:grid-cols-2 gap-px bg-slate-800/50">
                                <div className="bg-cosmic-card p-10 md:p-16 group hover:bg-[#15203b] transition-colors relative overflow-hidden">
                                    <div className="absolute inset-0 bg-gradient-to-br from-cyan-900/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                                    <Icons.Wand2 className="w-10 h-10 text-cyan-400 mb-8 opacity-50 group-hover:opacity-100 group-hover:drop-shadow-[0_0_10px_rgba(34,211,238,0.8)] transition-all relative z-10" />

                                    </p>
                                </div>

                                <div className="bg-cosmic-card p-10 md:p-16 group hover:bg-[#15203b] transition-colors relative overflow-hidden">
                                    <div className="absolute inset-0 bg-gradient-to-br from-gold/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                                    <Icons.Layers className="w-10 h-10 text-gold mb-8 opacity-50 group-hover:opacity-100 transition-opacity relative z-10" />
                                    <h3 className="text-2xl font-bold text-white mb-4 relative z-10">Rapid Pre-Visualization</h3>
                                    <p className="text-slate-400 leading-relaxed relative z-10">
                                        We reduce storyboard and development overheads by 70%, helping agencies win pitches and scale faster through specialized AI Pre-viz techniques.
                                    </p>
                                </div>

                                <div className="bg-cosmic-card p-10 md:p-16 group hover:bg-[#15203b] transition-colors relative overflow-hidden">
                                    <Icons.TrendingUp className="w-10 h-10 text-cyan-400 mb-8 opacity-50 group-hover:opacity-100 group-hover:drop-shadow-[0_0_10px_rgba(34,211,238,0.8)] transition-all relative z-10" />
                                    <h3 className="text-2xl font-bold text-white mb-4 relative z-10">Proven Growth Models</h3>
                                    <p className="text-slate-400 leading-relaxed relative z-10">
                                        Our studio methodology successfully generated 45,000+ organic subscribers, proving our ability to capture modern audience attention and build digital communities.
                                    </p>
                                </div>

                                <div className="bg-cosmic-card p-10 md:p-16 group hover:bg-[#15203b] transition-colors relative overflow-hidden">
                                    <Icons.Film className="w-10 h-10 text-gold mb-8 opacity-50 group-hover:opacity-100 transition-opacity relative z-10" />
                                    <h3 className="text-2xl font-bold text-white mb-4 relative z-10">Diverse Slate</h3>
                                    <p className="text-slate-400 leading-relaxed relative z-10">
                                        Currently managing 6+ projects in development, ranging from AI documentaries to sci-fi action features, AI Music Composition, and Visual Poetry.
                                    </p>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* The Methodology / AI Mastery Callout */}
                    <section className="py-24 px-6 md:px-12 bg-cosmic-dark border-t border-slate-800/50">
                        <div className="max-w-5xl mx-auto text-center">
                            <h2 className="text-3xl md:text-5xl font-serif text-white leading-tight mb-8 text-glow">
                                25,000 Hours of AI Research.<br/> <span className="text-gold italic glow-gold">213 Distinct Prompt Techniques.</span>
                            </h2>
                            <p className="text-lg md:text-xl text-slate-300 leading-relaxed max-w-4xl mx-auto font-light mb-8">
                                Over the past 5 years, Rishi has dedicated over 25,000 hours to mastering AI generation. This relentless research culminated in the creation of <strong className="text-white">"The Grand Prompt"</strong>—a proprietary framework rooted deeply in cinematic language. Because Rishi understands cinema intrinsically as a director, his prompts consistently outperform those developed by tech engineers. This mastery empowers a single individual to execute the scale of a 50-person studio.
                            </p>
                        </div>
                    </section>

                    {/* Services Callout */}
                    <section className="py-24 px-6 md:px-12 bg-cosmic-panel border-y border-slate-800/50 text-center relative overflow-hidden">
                        <div className="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-cyan-900/10 via-transparent to-transparent pointer-events-none"></div>
                        <p className="text-xl md:text-3xl font-light text-slate-300 max-w-4xl mx-auto leading-relaxed relative z-10">
                            Whether you require a high-impact digital campaign, a cost-efficient Pre-viz for a feature pitch, or full hybrid production services, <strong className="text-cyan-400 font-semibold drop-shadow-md">MTSP</strong> is equipped to deliver.
                        </p>
                    </section>

                    {/* The Work */}
                    <section id="work" className="py-24 px-6 md:px-12 bg-cosmic-dark">
                        <div className="max-w-7xl mx-auto">
                            <div className="flex items-center justify-between mb-12 border-b border-slate-800 pb-4">
                                <h2 className="text-3xl md:text-5xl font-bold uppercase tracking-tighter text-white glow-cyan">The Work</h2>
                            </div>
                            
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">

                                        src="https://img.youtube.com/vi/A85em5CoKc4/maxresdefault.jpg" 
                                        alt="Emergence of Shiva" 
                                        className="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-105"
                                    />
                                    <div className="absolute inset-0 bg-gradient-to-t from-[#020617] via-[#020617]/50 to-transparent flex flex-col items-center justify-end p-8 text-center pb-12 transition-colors duration-500 group-hover:bg-[#020617]/60">
                                        <h3 className="text-white text-3xl font-bold uppercase mb-4 text-glow">Emergence of Shiva</h3>
                                        <p className="text-slate-200 text-lg max-w-3xl mb-4 font-light leading-relaxed">
                                            A 19-minute saga merging ancient Vedic roots with a futuristic vision. Designed, scored, and generated entirely in AI by Rishi Goswami alone in 28 days—<strong className="text-white font-semibold">a feat that no traditional studio team of 50 could achieve.</strong>
                                        </p>
                                        <p className="text-gold text-sm tracking-widest uppercase font-bold flex items-center justify-center gap-2">
                                            <Icons.Film size={16} /> An Epic AI Space Film
                                        </p>
                                    </div>
                                </a>

                                {/* Project Frame 2: Body: Dreams of E7 */}
                                <a href="https://www.youtube.com/watch?v=i_Y3vZHYeUA" target="_blank" rel="noreferrer" className="group relative aspect-video bg-cosmic-card overflow-hidden cursor-pointer border border-slate-700/50 block">
                                    <img 
                                        src="https://drive.google.com/thumbnail?id=1-UYnX_9KbKv7FsGDlTuiVxeYA4UC7TAI&sz=w1200" 
                                        alt="Body: Dreams of E7" 
                                        className="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-105"
                                    />
                                    <div className="absolute inset-0 bg-gradient-to-t from-[#020617] via-[#020617]/60 to-transparent flex flex-col items-center justify-end p-6 text-center z-10 transition-colors duration-500 group-hover:bg-[#020617]/70">
                                        <h3 className="text-white text-2xl font-bold uppercase mb-2 drop-shadow-md">Body: Dreams of E7</h3>
                                        <p className="text-slate-300 text-sm leading-relaxed mb-4">
