<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Méliès to Spielberg Projects | Hybrid AI & Live-Action Studio</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel for browser-side rendering -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: black; color: #d1d5db; scroll-behavior: smooth; }
        .font-serif { font-family: 'Playfair Display', serif; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .hero-gradient { background: radial-gradient(ellipse_at_center, #333 0%, #000 100%); }
        .text-glow { text-shadow: 0 0 20px rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                if (window.lucide) window.lucide.createIcons();
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            });

            return (
                <div className="min-h-screen bg-black">
                    {/* Navigation */}
                    <nav className={`fixed w-full z-50 transition-all duration-500 ${scrolled ? 'bg-black/95 backdrop-blur-md py-4 border-b border-gray-900' : 'bg-transparent py-6'}`}>
                        <div className="max-w-7xl mx-auto px-6 md:px-12 flex justify-between items-center">
                            <div className="text-xl md:text-2xl font-serif font-bold tracking-tighter text-white uppercase">
                                MTSP <span className="text-gray-600 text-sm font-sans tracking-widest ml-2 hidden md:inline-block">Est. 2022</span>
                            </div>
                            <div className="flex gap-6 text-sm font-semibold tracking-widest uppercase text-gray-400">
                                <a href="#about" className="hover:text-white transition-colors hidden md:block">Mastery</a>
                                <a href="#work" className="hover:text-white transition-colors hidden md:block">The Work</a>
                                <a href="#slate" className="hover:text-white transition-colors hidden md:block">Slate</a>
                                <a href="#leadership" className="hover:text-white transition-colors">Leadership</a>

                            <div className="mb-12 flex flex-col items-center select-none w-full">
                                <h1 className="text-6xl md:text-[7rem] font-sans font-light tracking-widest text-white leading-none mb-4 text-glow">Méliès</h1>

                                    <div className="flex flex-col items-center justify-center text-gray-400 text-[10px] md:text-sm tracking-widest uppercase font-bold">

                                    <div className="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent flex flex-col items-center justify-end p-8 text-center pb-12">
                                        <h3 className="text-white text-3xl font-bold uppercase mb-4">Emergence of Shiva</h3>
                                        <p className="text-gray-200 text-lg max-w-3xl mb-4 font-light leading-relaxed">Generated entirely in AI by Rishi Goswami alone in 28 days—<strong>a feat unmatched by traditional teams of 50.</strong> 19-minute space saga merging ancient Vedic roots with a futuristic vision.</p>

                                        <p className="text-gray-300 text-sm font-light italic">Divine AI exploration of Radha & Krishna</p>
                                    </div>
                                </a>

                            <div className="grid grid-cols-2 md:grid-cols-5 gap-4 mb-12">
                                {[
                                    { id: 'e84smTQrNiU', title: 'We Are MTSP' }, { id: 'p-BIBkI-nDc', title: "Stranger's Dream" },
                                    { id: 'zl0hyRfZslY', title: 'Angel Born in Hell' }, { id: 'j1QzBOXBQ9E', title: 'Girl From Town' },
                                    { id: 'wF9QzJbVHM0', title: 'Sadashiv Ashtakam' }, { id: '39Wpzkeb8Xk', title: 'Kali Tandava' },
                                    { id: 'Mx47a8T1D4c', title: 'Dreams' }, { id: 'xRX_5Q9BBCQ', title: 'Elena & Cafe' },
                                    { id: 'SqBAJ-1cNeg', title: 'Shiv Tandav Rap' }, { id: '38CAouAbS3I', title: 'James et Elena' }

                            <div className="grid md:grid-cols-2 gap-6 mb-12">
                                <div className="bg-zinc-900 border border-gray-800 flex flex-col group overflow-hidden">
                                    <div className="h-64 overflow-hidden">
                                        <img src="https://drive.google.com/thumbnail?id=14d4iugB6vDgJNM4Zy1qF11dmfww9NvvV&sz=w1200" className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" />
                                    </div>
                                    <div className="p-8">
                                        <h3 className="text-white text-2xl font-bold uppercase mb-2 flex items-center gap-3"><i data-lucide="book-open" className="text-amber-500"></i> Visual Novels</h3>

                                    </div>
                                </div>
                                <div className="bg-zinc-900 border-l-4 border-l-blue-600 border-y border-r border-gray-800 p-8 flex flex-col justify-center">

                                </div>
                            </div>

                                <a href="https://www.youtube.com/watch?v=vayRxJhRpC0" target="_blank" className="group relative h-48 bg-zinc-900 border border-gray-800 overflow-hidden block">
